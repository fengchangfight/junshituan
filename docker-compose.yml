services:
  # ── PostgreSQL ──────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: junshituan-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: junshituan
      POSTGRES_USER: junshituan
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-junshituan_secret}
    ports:
      - "5432:5432"
    volumes:
      - ./docker/data/postgres:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U junshituan -d junshituan"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── etcd (Milvus dependency) ────────────────────────────────────
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: junshituan-etcd
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    volumes:
      - ./docker/data/etcd:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (Milvus dependency) ───────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: junshituan-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: minio server /minio_data --console-address ":9001"
    volumes:
      - ./docker/data/minio:/minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Milvus Standalone ───────────────────────────────────────────
  milvus:
    image: milvusdb/milvus:v2.4.0
    container_name: junshituan-milvus
    restart: unless-stopped
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: minioadmin
      MINIO_SECRET_ACCESS_KEY: minioadmin
      COMMON_STORAGETYPE: local
    command: milvus run standalone
    ports:
      - "19530:19530"
    volumes:
      - ./docker/data/milvus:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Milvus Attu (GUI, optional) ─────────────────────────────────
  attu:
    image: zilliz/attu:v2.4
    container_name: junshituan-attu
    restart: unless-stopped
    depends_on:
      milvus:
        condition: service_healthy
    environment:
      MILVUS_URL: milvus:19530
    ports:
      - "8001:3000"

  # ── pgweb (PostgreSQL web GUI, lightweight) ────────────────────
  pgweb:
    image: sosedoff/pgweb:latest
    container_name: junshituan-pgweb
    restart: unless-stopped
    command: pgweb --bind=0.0.0.0 --listen=80 --auth-user=${PGWEB_USER:-admin} --auth-pass=${PGWEB_PASS:-change-me} --url=postgres://${POSTGRES_USER:-junshituan}:${POSTGRES_PASSWORD:-junshituan_secret}@postgres:5432/junshituan?sslmode=disable
    depends_on:
      - postgres
    ports:
      - "8865:80"

  # ── Backend ─────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: junshituan-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      milvus:
        condition: service_healthy
    environment:
      # Database & Milvus
      DATABASE_URL: postgresql+asyncpg://junshituan:${POSTGRES_PASSWORD:-junshituan_secret}@postgres:5432/junshituan
      MILVUS_HOST: milvus
      MILVUS_PORT: "19530"
      # LLM
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.deepseek.com/v1}
      LLM_MODEL: ${LLM_MODEL:-deepseek-v4-pro}
      # Embedding (ZhipuAI embedding-2)
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      # EMBEDDING_MODEL: embedding-2
      # EMBEDDING_BASE_URL: https://open.bigmodel.cn/api/paas/v4
      # SMS (Alibaba Cloud)
      ALIBABACLOUD_ACCESS_KEY_ID: ${ALIBABACLOUD_ACCESS_KEY_ID:-}
      ALIBABACLOUD_ACCESS_KEY_SECRET: ${ALIBABACLOUD_ACCESS_KEY_SECRET:-}
      SMS_SIGN_NAME: ${SMS_SIGN_NAME:-恒创联众}
      SMS_TEMPLATE_CODE: ${SMS_TEMPLATE_CODE:-SMS_100001}
      # Auth
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      CORS_ORIGINS: '${CORS_ORIGINS:-["http://localhost:3000"]}'
      PERSONAS_DIR: /app/data/personas
      UPLOADS_DIR: /app/data/uploads
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data/personas:/app/data/personas:ro
      - ./backend/data/uploads:/app/data/uploads
      - ./backend/data:/app/data

  # ── Frontend ────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: junshituan-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"

